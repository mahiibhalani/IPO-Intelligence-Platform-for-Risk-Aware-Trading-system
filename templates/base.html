<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI-Driven IPO Intelligence Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Dark theme with gradient background */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #1a1a2e 75%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
        }

        /* Glassmorphism effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        /* Neon accent colors */
        .neon-green { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .neon-purple { color: #9d4edd; text-shadow: 0 0 10px #9d4edd; }
        .neon-blue { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
        .neon-pink { color: #ff0080; text-shadow: 0 0 10px #ff0080; }

        /* Navbar styles */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            overflow: visible !important;
            position: relative;
            z-index: 1050;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: #00d4ff !important;
        }

        .nav-link {
            color: #e0e0e0 !important;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #00ff88 !important;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 0.5rem 1rem;
            color: #e0e0e0;
        }

        .search-bar::placeholder {
            color: #b0b0b0;
        }

        .btn-login {
            background: linear-gradient(45deg, #9d4edd, #ff0080);
            border: none;
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
            color: white;
            font-weight: bold;
        }

        .btn-login:hover {
            background: linear-gradient(45deg, #ff0080, #9d4edd);
            transform: scale(1.05);
            transition: all 0.3s ease;
        }

        /* Dropdown menu styles */
        .dropdown {
            position: relative;
        }

        .dropdown-menu-dark {
            background: rgba(20, 20, 40, 0.98) !important;
            border: 1px solid rgba(157, 78, 221, 0.3) !important;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6) !important;
            border-radius: 12px !important;
            min-width: 180px;
            z-index: 9999 !important;
            position: absolute !important;
            top: calc(100% + 8px) !important;
        }

        .dropdown-menu-dark .dropdown-item {
            color: #e0e0e0 !important;
            transition: all 0.25s ease;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            margin: 2px 6px;
            width: calc(100% - 12px);
        }

        .dropdown-menu-dark .dropdown-item:hover {
            background: rgba(157, 78, 221, 0.25) !important;
            color: #00ff88 !important;
        }

        /* Logout item — distinct red style */
        .dropdown-menu-dark .dropdown-item.logout-item {
            color: #ff6b6b !important;
        }

        .dropdown-menu-dark .dropdown-item.logout-item:hover {
            background: rgba(255, 107, 107, 0.2) !important;
            color: #ff4444 !important;
        }

        .dropdown-menu-dark .dropdown-divider {
            border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
            margin: 4px 0;
        }

        /* Hero section */
        .hero-section {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.1), rgba(255, 0, 128, 0.1));
            border-radius: 20px;
            margin: 2rem 0;
            backdrop-filter: blur(5px);
        }

        .hero-heading {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00d4ff, #9d4edd, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .hero-subheading {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 2rem;
        }

        .btn-cta {
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            border: none;
            border-radius: 25px;
            padding: 0.75rem 2rem;
            color: white;
            font-weight: bold;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        /* Filter section */
        .filter-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
            margin: 0.25rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(45deg, #9d4edd, #ff0080);
            color: white;
            transform: scale(1.05);
        }

        /* IPO Cards */
        .ipo-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1rem 0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .ipo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00ff88, #00d4ff, #9d4edd);
        }

        .ipo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .card-header-with-star {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-live { background: #00ff88; color: black; }
        .status-upcoming { background: #ffd700; color: black; }
        .status-closed { background: #ff6b6b; color: white; }

        /* Star Button Styles */
        .star-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.25rem;
            color: #ffd700;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .star-button:hover {
            transform: scale(1.2) rotate(15deg);
            text-shadow: 0 0 10px #ffd700;
            filter: drop-shadow(0 0 5px #ffd700);
        }

        .star-button.saved i {
            font-weight: 900;
        }

        .star-button.saved i::before {
            content: "\f005";
        }

        .star-button i {
            transition: all 0.3s ease;
        }

        .recommendation-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .rec-strong-buy { background: #00ff88; color: black; }
        .rec-neutral { background: #ffd700; color: black; }
        .rec-avoid { background: #ff6b6b; color: white; }

        .ai-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 8px;
            margin: 0.5rem 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border-radius: 10px;
            height: 100%;
            transition: width 0.3s ease;
        }

        .btn-analysis {
            background: linear-gradient(45deg, #9d4edd, #ff0080);
            border: none;
            border-radius: 25px;
            padding: 0.5rem 1.5rem;
            color: white;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-analysis:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.3);
        }

        /* Scroll to top button */
        .scroll-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .scroll-to-top.show {
            opacity: 1;
        }

        .scroll-to-top:hover {
            transform: scale(1.1);
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.1) 25%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .hero-heading { font-size: 2rem; }
            .ipo-grid { grid-template-columns: 1fr; }
        }

        .ipo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Container adjustments */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line"></i> IPO Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/mainboard">Mainboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sme">SME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/upcoming">Upcoming</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/live">Live</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/heatmap">Heatmap</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/news">IPO News</a>
                    </li>
                </ul>
                <form class="d-flex me-3">
                    <input class="form-control search-bar" type="search" placeholder="Search IPOs..." aria-label="Search">
                </form>
                {% if current_user.is_authenticated %}
                <div class="dropdown">
                    <button class="btn btn-login dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        {{ current_user.get_full_name() }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="/auth/profile"><i class="fas fa-user me-2"></i> My Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item logout-item" href="/auth/logout"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                    </ul>
                </div>
                {% else %}
                <a href="/auth/login" class="btn btn-login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Scroll to top button -->
    <button class="scroll-to-top" id="scrollToTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Scroll to top functionality
        const scrollToTopBtn = document.getElementById('scrollToTop');
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollToTopBtn.classList.add('show');
            } else {
                scrollToTopBtn.classList.remove('show');
            }
        });

        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
