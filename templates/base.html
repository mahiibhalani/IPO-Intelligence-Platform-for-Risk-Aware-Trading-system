<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI-Driven IPO Intelligence Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        .main-header {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1E3A5F;
            text-align: center;
            margin-bottom: 1rem;
        }
        .sub-header {
            font-size: 1.2rem;
            color: #6B7280;
            text-align: center;
            margin-bottom: 2rem;
        }
        .recommendation-strong-apply {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 1.5rem;
            border-radius: 10px;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .recommendation-apply {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            padding: 1.5rem;
            border-radius: 10px;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .recommendation-hold {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 1.5rem;
            border-radius: 10px;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .recommendation-avoid {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            padding: 1.5rem;
            border-radius: 10px;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .insight-positive {
            background-color: #d4edda;
            border-left: 4px solid #28a745;
            padding: 0.5rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0 5px 5px 0;
        }
        .insight-negative {
            background-color: #f8d7da;
            border-left: 4px solid #dc3545;
            padding: 0.5rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0 5px 5px 0;
        }
        .risk-low { color: #28a745; font-weight: bold; }
        .risk-medium { color: #ffc107; font-weight: bold; }
        .risk-high { color: #dc3545; font-weight: bold; }
        .navbar-brand { font-weight: bold; }
        .card { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">📈 IPO Intelligence Platform</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">🏠 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ipo-analysis">🔍 IPO Analysis</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/market-overview">📊 Market Overview</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/model-insights">🤖 Model Insights</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">ℹ️ About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
